<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chartline AI — Compass Rose Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F1C33;
            color: #F0EDE4;
            padding: 3rem 2rem;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
        .subtitle { color: #8FA3BF; font-size: 0.92rem; margin-bottom: 3rem; }
        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #D4567A;
            margin-bottom: 1.2rem;
            margin-top: 3rem;
        }

        .rose-showcase {
            display: flex;
            justify-content: center;
            padding: 3rem 0;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .logo-card {
            border-radius: 16px;
            padding: 3rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-card.dark { background: #0F1C33; border: 1px solid rgba(194,178,128,0.1); }
        .logo-card.light { background: #F0EDE4; }
        .logo-card.mid { background: #1B2A4A; }
        .logo-card.white { background: #ffffff; }

        .variants-row {
            display: flex;
            gap: 2.5rem;
            align-items: flex-start;
            padding: 1.5rem 0;
            flex-wrap: wrap;
        }
        .variant-group { text-align: center; }
        .icon-card {
            width: 72px; height: 72px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-label {
            font-size: 0.72rem;
            color: #627D98;
            margin-top: 0.5rem;
        }

        .section-divider {
            border: none;
            border-top: 1px solid rgba(194,178,128,0.08);
            margin: 2rem 0;
        }

        @media (max-width: 700px) {
            .logo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container">

<h1>Chartline AI — Compass Rose Logo</h1>
